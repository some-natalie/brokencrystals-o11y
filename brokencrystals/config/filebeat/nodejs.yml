filebeat.inputs:
  - type: filestream
    id: nodejs-container-logs
    paths:
      - '/var/lib/docker/containers/*/*.log'
    parsers:
      - container:
          stream: all
          format: auto
      - ndjson:
          target: ''
          overwrite_keys: true
          add_error_key: true
    processors:
      - add_docker_metadata:
          host: 'unix:///var/run/docker.sock'
      - add_fields:
          target: ''
          fields:
            service.name: nodejs
            service.type: application
      - decode_json_fields:
          fields: ['message']
          target: ''
          overwrite_keys: true
          when:
            contains:
              message: 'trace.id'

output.elasticsearch:
  hosts: ['http://host.docker.internal:9200']
  username: 'elastic'
  password: 'Tn99rhPs'
  index: 'filebeat-nodejs-%{+yyyy.MM.dd}'

setup.ilm.enabled: false
setup.template.name: 'filebeat-nodejs'
setup.template.pattern: 'filebeat-nodejs-*'

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
